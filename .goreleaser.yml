version: 2

builds:
  - main: .
    binary: td
    ldflags:
      - -s -w -X main.Version={{ .Version }}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - CHANGELOG.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

# Note: GoReleaser does NOT publish the Homebrew formula (there is intentionally
# no `brews:` block). The formula in marcus/homebrew-tap builds from source (to
# avoid Gatekeeper warnings on macOS) and is bumped automatically by the separate
# `update-homebrew-tap` job in .github/workflows/release.yml, which rewrites the
# tag URL and the source-tarball sha256 in Formula/td.rb after each tagged build.
